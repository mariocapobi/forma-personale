name: Pubblica Forma
on:
  push:
    paths:
      - ".github/workflows/pubblica-forma.yml"

permissions:
  contents: write

jobs:
  pubblica:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Estrai i file dell'app
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > forma-personale.zip
          unzip -o forma-personale.zip
          rm forma-personale.zip
          rm .github/workflows/pubblica-forma.yml

      - name: Salva la versione pubblica
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Pubblica Forma"
          git push
