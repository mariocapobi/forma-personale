name: Correggi icone
on:
  push:
    paths:
      - ".github/workflows/correggi-icone.yml"

permissions:
  contents: write

jobs:
  correggi:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Sposta le icone
        shell: bash
        run: |
          mkdir -p icons
          mv icon.svg icon-192.png icon-512.png icons/
          rm .github/workflows/correggi-icone.yml

      - name: Salva la correzione
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sistema le icone della PWA"
          git push
