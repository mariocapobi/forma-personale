name: Aggiorna Forma v5
on:
  push:
    paths:
      - .github/workflows/aggiorna-forma-v5.yml

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Applica aggiornamento
        env:
          APP_ZIP_BASE64: 
        run: |
          echo "$APP_ZIP_BASE64" | base64 -d > /tmp/forma-v5.zip
          unzip -o /tmp/forma-v5.zip -d . || [ $? -eq 1 ]
          rm -f .github/workflows/aggiorna-forma-v5.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aggiunge sincronizzazione automatica Salute"
          git push
