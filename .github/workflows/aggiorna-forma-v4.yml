name: Aggiorna Forma v4
on:
  push:
    paths:
      - .github/workflows/aggiorna-forma-v4.yml

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Applica aggiornamento
        env:
          APP_ZIP_BASE64: 
        run: |
          printf '%s' "$APP_ZIP_BASE64" | base64 -d > /tmp/forma-v4.zip
          unzip -o /tmp/forma-v4.zip -d .
          rm -f .github/workflows/aggiorna-forma-v4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css sw.js
          git add -u .github/workflows/aggiorna-forma-v4.yml
          git commit -m "Aggiunge attività libere e piano pasti settimanale"
          git push
